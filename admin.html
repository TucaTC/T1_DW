<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TechShop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>TechShop</h1>
        <p>Painel do Funcionário</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="peças.html">Peças de Hardware</a></li>
            <li><a href="pc.html">Computadores Pré-Montados</a></li>
            <li><a href="note.html">Notebooks</a></li>
            <li><a href="cell.html">Celulares</a></li>
            <li><a href="tblt.html">Tablets</a></li>
            <li><a href="cart.html">Carrinho</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Registrar</a></li>
        </ul>
    </nav>
    <main>
        <section class="admin-form">
            <h2>Adicionar Item</h2>
            <form id="addItemForm">
                <label for="category">Categoria:</label>
                <select id="category">
                    <option value="peças">Peças de Hardware</option>
                    <option value="pc">Computadores Pré-Montados</option>
                    <option value="note">Notebooks</option>
                    <option value="cell">Celulares</option>
                    <option value="tblt">Tablets</option>
                </select>
                <label for="name">Nome:</label>
                <input type="text" id="name" required>
                <label for="description">Descrição:</label>
                <input type="text" id="description" required>
                <label for="price">Preço:</label>
                <input type="number" id="price" required>
                <button type="submit">Adicionar</button>
            </form>
            <p id="adminMessage"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 TechShop. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
