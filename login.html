<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechShop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="topbar">
      <a class="home-link" href="index.html">Início</a>
      <div class="topbar-right">
        <a class="cart-link" href="cart.html">Carrinho</a>
        <a class="auth-link" href="auth.html">Entrar</a>
      </div>
    </div>
    <header>
        <h1>TechShop</h1>
        <p>Login</p>
    </header>
    <main>
        <section class="login-form">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Usuário:</label>
                <input type="text" id="username" required>
                <label for="password">Senha:</label>
                <input type="password" id="password" required>
                <label for="role">Tipo:</label>
                <select id="role">
                    <option value="customer">Cliente</option>
                    <option value="employee">Funcionário</option>
                </select>
                <button type="submit">Entrar</button>
            </form>
            <p id="message"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 TechShop. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
